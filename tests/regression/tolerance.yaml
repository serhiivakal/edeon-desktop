# Per-endpoint tolerance for numeric predictions.
# A prediction is considered drifted if |new - expected| > tolerance.
bee_acute_oral_ld50:
  rel_tol: 0.05      # 5% relative tolerance
  abs_tol: 0.001     # absolute floor
