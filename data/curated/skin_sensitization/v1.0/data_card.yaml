known_biases:
- Strong bias toward fragrance chemicals, cosmetic ingredients, and common industrial
  preservatives.
- Over-represents strong and non-sensitizers relative to weak sensitizers.
- Binary classifications collapse potency ranges, masking the distinction between
  weak and strong sensitizers.
intended_use: Training and benchmarking Tier-1 classification QSAR skin sensitization
  models.
not_intended_for:
- Direct clinical or regulatory dossier submissions without expert dermatological
  review
- Quantitative potency estimation from binary class assignments.
