inclusion_criteria:
- In vivo Bird acute oral LD50 toxicity records only
- Endpoint = LD50, exposure route = oral
- 'Species pooled: Colinus virginianus, Anas platyrhynchos, Coturnix japonica, Phasianus
  colchicus, Passer domesticus'
- 'Canonical units: mg/kg bw'
exclusion_criteria:
- Mixtures, formulations, or records with missing structures
- Non-oral exposure routes (dermal, inhalation, aquatic, etc.)
- Non-positive numeric LD50 values
- Compounds containing atoms outside default organic allowlist
