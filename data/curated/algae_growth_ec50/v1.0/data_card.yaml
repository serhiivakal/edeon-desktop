inclusion_criteria:
- In vivo Algae growth EC50 toxicity records only
- "Endpoint \u2208 {EC50, ErC50, EbC50}"
- Effect = GRO (growth) or POP (population)
- Test duration = 72h (64.8h - 79.2h)
- Species restricted to Raphidocelis subcapitata, Selenastrum capricornutum, Chlorella
  vulgaris, Desmodesmus subspicatus
- Exposure = aquatic
exclusion_criteria:
- Mixtures, formulations, or records with missing structures
- Non-aquatic exposure routes
- Non-positive numeric concentration values
- Compounds containing atoms outside default organic allowlist
