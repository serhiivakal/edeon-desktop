    status: available
known_biases:
- PPDB-derived data represents registered commercial pesticide active ingredients,
  which may under-represent novel discovery chemotypes.
- Significant bias towards legacy insecticide and herbicide chemical space.
intended_use: Training and benchmarking Tier-1 QSAR earthworm acute LC50 prediction
  models.
not_intended_for:
- Direct regulatory dossier submission without supplementary OECD 207 testing
- Quantitative risk assessment for non-soil invertebrate species
