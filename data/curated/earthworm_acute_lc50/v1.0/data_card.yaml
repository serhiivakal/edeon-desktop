inclusion_criteria:
- Experimentally measured earthworm acute toxicity (LC50) records
- Eisenia fetida or Eisenia andrei species only
- OECD 207 or equivalent 14-day tests
- 'Canonical units: mg/kg soil'
exclusion_criteria:
- Mixtures, formulations, or records with missing structures
- Compounds containing atoms outside default organic allowlist
- Values reported outside the standard OECD 207 artificial soil parameters
standardisation:
  tool: chembl_structure_pipeline
  version: 1.2.4
  tautomer: rdkit-canonical
  atom_allowlist:
  - H
  - B
  - C
  - N
  - O
  - F
  - Si
  - P
  - S
  - Cl
  - Se
  - Br
  - I
  mw_range:
  - 50.0
  - 1500.0
activity:
  units_canonical: mg/kg soil
  log_transform: log10_mg_per_kg
  aggregation: geometric_mean
  censored_handling: flagged_kept
