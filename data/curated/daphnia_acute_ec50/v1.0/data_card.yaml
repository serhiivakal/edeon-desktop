  raw_records: 4181
inclusion_criteria:
- In vivo Daphnia acute EC50 toxicity records only
- Effect = IMM (immobilisation) or MOR (mortality)
- Test duration = 48h (45.6h - 50.4h)
- Species restricted to Daphnia magna (primary) and Daphnia pulex (secondary)
- Exposure = aquatic
exclusion_criteria:
- Mixtures, formulations, or records with missing structures
- Non-aquatic exposure routes (injection, dietary, dermal, oral gavage, etc.)
- Non-positive numeric concentration values
- Compounds containing atoms outside default organic allowlist
standardisation:
  tool: chembl_structure_pipeline
  version: 1.2.4
  tautomer: rdkit-canonical
