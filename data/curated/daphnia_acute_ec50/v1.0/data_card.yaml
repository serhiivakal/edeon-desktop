known_biases:
- Species-specific and chemical-specific bias in ECOTOX reporting (focus on standard
  test species like Daphnia magna).
intended_use: Training and benchmarking Tier-1 QSAR Daphnia acute EC50 prediction
  models.
not_intended_for:
- Direct regulatory dossier submission without supplementary dossier review
- Quantitative aquatic risk assessment without local validation
