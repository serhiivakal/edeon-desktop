known_biases:
- enviPath data primarily represents commercial pesticide active ingredients and key
  industrial chemicals subject to regulatory testing requirements.
- Significant bias toward compound classes like triazines, organophosphates, and urea
  herbicides.
- Soil type, organic matter, temperature, and moisture variations are not explicit
  features, contributing to high within-compound target variance.
intended_use: Training and benchmarking heteroscedastic Tier-1 QSAR soil DT50 prediction
  models.
not_intended_for:
- Direct regulatory compliance submissions without referencing target soil properties
- Averaging the one-to-many records into a single point value without accounting for
  the variance distribution.
