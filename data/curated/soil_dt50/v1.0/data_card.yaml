inclusion_criteria:
- Soil degradation half-life (DT50) values
- Individual records preserved (no per-compound value aggregation) to capture soil
  study variations
- 'Canonical units: days'
exclusion_criteria:
- Mixtures, formulations, or records with missing chemical structures
- Compounds containing atoms outside default organic allowlist
- Non-positive half-life values
